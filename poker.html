<!DOCTYPE html>                                                                                                                                                                                                                             
  <html>                                                                                                                                                                                                                                      
  <head>                                                                                                                                                                                                                                      
    <title>Poker Settler</title>                                                                                                                                                                                                              
    <meta name="viewport" content="width=device-width, initial-scale=1">                                                                                                                                                                      
    <style>                                                                                                                                                                                                                                   
      * { box-sizing: border-box; font-family: -apple-system, sans-serif; }                                                                                                                                                                   
      body { max-width: 500px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: white; }                                                                                                                                            
      h1 { text-align: center; }                                                                                                                                                                                                              
      .player { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 10px; }                                                                                                                                                    
      .player input { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; }                                                                                                                                          
      .player label { font-size: 14px; color: #aaa; }                                                                                                                                                                                         
      button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; }                                                                                                             
      .add-btn { background: #0f3460; color: white; }                                                                                                                                                                                         
      .calc-btn { background: #e94560; color: white; }                                                                                                                                                                                        
      .result { background: #0f3460; padding: 15px; border-radius: 10px; margin-top: 20px; }                                                                                                                                                  
      .transaction { padding: 10px; margin: 5px 0; background: #16213e; border-radius: 5px; }                                                                                                                                                 
      .remove-btn { background: #e94560; color: white; padding: 5px 10px; float: right; border-radius: 5px; }                                                                                                                                 
    </style>                                                                                                                                                                                                                                  
  </head>                                                                                                                                                                                                                                     
  <body>                                                                                                                                                                                                                                      
    <h1>🃏 Poker Settler</h1>                                                                                                                                                                                                                 
                                                                                                                                                                                                                                              
    <div id="players"></div>                                                                                                                                                                                                                  
                                                                                                                                                                                                                                              
    <button class="add-btn" onclick="addPlayer()">+ Add Player</button>                                                                                                                                                                       
    <button class="calc-btn" onclick="calculate()">Calculate Payments</button>                                                                                                                                                                
                                                                                                                                                                                                                                              
    <div id="results"></div>                                                                                                                                                                                                                  
                                                                                                                                                                                                                                              
    <script>                                                                                                                                                                                                                                  
      let playerCount = 0;                                                                                                                                                                                                                    
                                                                                                                                                                                                                                              
      function addPlayer() {                                                                                                                                                                                                                  
        playerCount++;                                                                                                                                                                                                                        
        const div = document.createElement('div');                                                                                                                                                                                            
        div.className = 'player';                                                                                                                                                                                                             
        div.id = `player-${playerCount}`;                                                                                                                                                                                                     
        div.innerHTML = `                                                                                                                                                                                                                     
          <button class="remove-btn" onclick="removePlayer(${playerCount})">✕</button>                                                                                                                                                        
          <label>Name</label>                                                                                                                                                                                                                 
          <input type="text" placeholder="Name" id="name-${playerCount}">                                                                                                                                                                     
          <label>Total Buy-ins ($)</label>                                                                                                                                                                                                    
          <input type="number" placeholder="e.g. 100" id="buyin-${playerCount}">                                                                                                                                                              
          <label>Final Chips ($)</label>                                                                                                                                                                                                      
          <input type="number" placeholder="e.g. 85" id="final-${playerCount}">                                                                                                                                                               
        `;                                                                                                                                                                                                                                    
        document.getElementById('players').appendChild(div);                                                                                                                                                                                  
      }                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                              
      function removePlayer(id) {                                                                                                                                                                                                             
        document.getElementById(`player-${id}`).remove();                                                                                                                                                                                     
      }                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                              
      function calculate() {                                                                                                                                                                                                                  
        const players = document.querySelectorAll('.player');                                                                                                                                                                                 
        let nets = {};                                                                                                                                                                                                                        
                                                                                                                                                                                                                                              
        players.forEach(p => {                                                                                                                                                                                                                
          const id = p.id.split('-')[1];                                                                                                                                                                                                      
          const name = document.getElementById(`name-${id}`).value || `Player ${id}`;                                                                                                                                                         
          const buyIn = parseFloat(document.getElementById(`buyin-${id}`).value) || 0;                                                                                                                                                        
          const final = parseFloat(document.getElementById(`final-${id}`).value) || 0;                                                                                                                                                        
          nets[name] = final - buyIn;                                                                                                                                                                                                         
        });                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                              
        // Check if it balances                                                                                                                                                                                                               
        const total = Object.values(nets).reduce((a, b) => a + b, 0);                                                                                                                                                                         
        if (Math.abs(total) > 0.01) {                                                                                                                                                                                                         
          document.getElementById('results').innerHTML = `                                                                                                                                                                                    
            <div class="result" style="background: #e94560;">                                                                                                                                                                                 
              ⚠️ Numbers don't add up! Off by $${total.toFixed(2)}                                                                                                                                                                            
            </div>                                                                                                                                                                                                                            
          `;                                                                                                                                                                                                                                  
          return;                                                                                                                                                                                                                             
        }                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                              
        // Settle                                                                                                                                                                                                                             
        const transactions = settle(nets);                                                                                                                                                                                                    
                                                                                                                                                                                                                                              
        let html = '<div class="result"><h3>💰 Payments:</h3>';                                                                                                                                                                               
        if (transactions.length === 0) {                                                                                                                                                                                                      
          html += '<p>Everyone is even!</p>';                                                                                                                                                                                                 
        }                                                                                                                                                                                                                                     
        transactions.forEach(t => {                                                                                                                                                                                                           
          html += `<div class="transaction">                                                                                                                                                                                                  
            <strong>${t.from}</strong> pays <strong>${t.to}</strong> → $${t.amount.toFixed(2)}                                                                                                                                                
          </div>`;                                                                                                                                                                                                                            
        });                                                                                                                                                                                                                                   
        html += '</div>';                                                                                                                                                                                                                     
                                                                                                                                                                                                                                              
        document.getElementById('results').innerHTML = html;                                                                                                                                                                                  
      }                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                              
      function settle(nets) {                                                                                                                                                                                                                 
        let losers = [];                                                                                                                                                                                                                      
        let winners = [];                                                                                                                                                                                                                     
                                                                                                                                                                                                                                              
        for (let [name, amount] of Object.entries(nets)) {                                                                                                                                                                                    
          if (amount < -0.01) losers.push({ name, amount: Math.abs(amount) });                                                                                                                                                                
          if (amount > 0.01) winners.push({ name, amount });                                                                                                                                                                                  
        }                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                              
        losers.sort((a, b) => b.amount - a.amount);                                                                                                                                                                                           
        winners.sort((a, b) => b.amount - a.amount);                                                                                                                                                                                          
                                                                                                                                                                                                                                              
        let transactions = [];                                                                                                                                                                                                                
                                                                                                                                                                                                                                              
        while (losers.length > 0 && winners.length > 0) {                                                                                                                                                                                     
          let loser = losers[0];                                                                                                                                                                                                              
          let winner = winners[0];                                                                                                                                                                                                            
          let payment = Math.min(loser.amount, winner.amount);                                                                                                                                                                                
                                                                                                                                                                                                                                              
          transactions.push({ from: loser.name, to: winner.name, amount: payment });                                                                                                                                                          
                                                                                                                                                                                                                                              
          loser.amount -= payment;                                                                                                                                                                                                            
          winner.amount -= payment;                                                                                                                                                                                                           
                                                                                                                                                                                                                                              
          if (loser.amount < 0.01) losers.shift();                                                                                                                                                                                            
          if (winner.amount < 0.01) winners.shift();                                                                                                                                                                                          
        }                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                              
        return transactions;                                                                                                                                                                                                                  
      }                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                              
      // Start with 2 players                                                                                                                                                                                                                 
      addPlayer();                                                                                                                                                                                                                            
      addPlayer();                                                                                                                                                                                                                            
    </script>                                                                                                                                                                                                                                 
  </body>                                                                                                                                                                                                                                     
  </html>
